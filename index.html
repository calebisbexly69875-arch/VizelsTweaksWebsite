<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VizelTweaks</title>
</head>

<body>

  <!-- your website HTML goes here -->

  <script>
    const cursorGlow = document.getElementById('cursorGlow');

    document.addEventListener('mousemove', e => {
      if (cursorGlow) {
        cursorGlow.style.left = e.clientX + 'px';
        cursorGlow.style.top = e.clientY + 'px';
      }
    });

    function startCounters() {
      const productCounter = document.getElementById('productCounter');
      const cleanCounter = document.getElementById('cleanCounter');
      const supportCounter = document.getElementById('supportCounter');

      let products = 0;
      let clean = 0;
      let support = 0;

      const interval = setInterval(() => {
        products = Math.min(products + 1, 7);
        clean = Math.min(clean + 10, 100);
        support = Math.min(support + 1, 24);

        if (productCounter) productCounter.textContent = products;
        if (cleanCounter) cleanCounter.textContent = clean + '%';
        if (supportCounter) supportCounter.textContent = support + '/7';

        if (products >= 7 && clean >= 100 && support >= 24) clearInterval(interval);
      }, 70);
    }

    function initParticles() {
      const canvas = document.getElementById('particleCanvas');
      if (!canvas) return;

      const ctx = canvas.getContext('2d');
      let particles = [];

      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }

      function createParticles() {
        particles = [];
        for (let i = 0; i < 80; i++) {
          particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 2.2 + 0.4,
            speed: Math.random() * 0.55 + 0.12,
            alpha: Math.random() * 0.5 + 0.15
          });
        }
      }

      function animateParticles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        particles.forEach(p => {
          p.y -= p.speed;
          p.x += Math.sin(p.y * 0.01) * 0.2;

          if (p.y < -10) {
            p.y = canvas.height + 10;
            p.x = Math.random() * canvas.width;
          }

          ctx.fillStyle = `rgba(255, 43, 43, ${p.alpha})`;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fill();
        });

        requestAnimationFrame(animateParticles);
      }

      resizeCanvas();
      createParticles();
      animateParticles();

      window.addEventListener('resize', () => {
        resizeCanvas();
        createParticles();
      });
    }

    function showPage(pageId) {
      document.querySelectorAll('.page').forEach(page => {
        page.classList.remove('active-page');
      });

      const selectedPage = document.getElementById(pageId);
      if (selectedPage) {
        selectedPage.classList.add('active-page');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    }

    startCounters();
    initParticles();
  </script>
</body>
</html>
